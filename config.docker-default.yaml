# Minimal config for the Docker image. No model is bundled — mount a GGUF
# at /models/default.gguf, or set LLAMA_SKEIN_MODEL_URL (see
# docker-entrypoint.sh).
#
# --parallel 1 is set explicitly: llama-server divides n_ctx across parallel
# slots, and its defaults for both n_ctx and slot count are version-dependent
# (observed b-a410713: 4 slots x 65k with no flags, n_ctx 4096 with
# --parallel 1). One agent per host is this image's use case; explicit flags
# keep the advertised context truthful. Set LLAMA_ARG_CTX_SIZE to cap n_ctx
# (llama-server reads it natively) — do not rely on the built-in default.
# Adjust -ngl below directly for your hardware.
#
# GPU tuning: on AMD GPUs llama-skein auto-detects the gfx arch and injects
# verified flags (flash attention, and MTP for MTP models) from its tuning
# database — see internal/tuning/profiles.yaml and GET /api/tuning. Anything
# set explicitly here always wins; disable injection with `tuning: {enabled:
# false}` or tweak it via PATCH /api/tuning. The --parallel 1 above is
# therefore redundant on a recognized GPU but harmless (and still correct on
# CPU-only or unrecognized hosts, where no profile applies).

healthCheckTimeout: 120
logLevel: info

# Global hard cap on how long a single request may run (wall clock). Inherited
# by any model without its own maxRequestTimeSecs. If a backend wedges (e.g. a
# GPU-kernel deadlock), the request is cancelled at this cap and the backend
# restarted if the slot doesn't release — so a stuck model self-heals instead
# of hanging forever. 0 = no limit. 900s (15 min) suits long agentic turns;
# lower it if your requests are short. The GPU-stall watchdog recovers faster
# when perf monitoring + a single GPU are present; this is the backstop.
maxRequestTimeSecs: 900

# How long a request for one model waits behind a busy sibling that must be
# evicted first (single-model-at-a-time groups) before being refused with a
# clear error instead of queued indefinitely. The router never interrupts a
# busy generation to load something else — it queues — but an unbounded queue
# means switching models hangs with zero feedback if what it's queued behind
# is wedged rather than merely busy. Defaults to 10 even if omitted here; set
# to 0 to restore unbounded queueing.
# swapQueueTimeoutSecs: 10

# Dedicated inference appliance: keep the model resident. ttl defaults to 0
# (never auto-unload — the idle-unload timer is only armed for ttl > 0), so a
# loaded model stays in VRAM until the next reload. Preload it at startup so
# the FIRST request after a (re)start doesn't pay the cold-load cost of moving
# tens of GB into VRAM. Remove the hook if you'd rather load lazily.
hooks:
  on_startup:
    preload:
      - default

macros:
  "llama-server": "/usr/local/bin/llama-server --port ${PORT}"

models:
  "default":
    name: "LLAMA_SKEIN_MODEL_NAME_PLACEHOLDER"
    description: "LLAMA_SKEIN_MODEL_DESC_PLACEHOLDER"
    cmd: |
      ${llama-server}
      --model /models/default.gguf
      -ngl 999
      --parallel 1
