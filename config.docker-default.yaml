# Minimal config for the Docker image. No model is bundled — mount a GGUF
# at /models/default.gguf, or set LLAMA_SKEIN_MODEL_URL (see
# docker-entrypoint.sh) and adjust --ctx-size / -ngl for your hardware.

healthCheckTimeout: 120
logLevel: info

macros:
  "llama-server": "/usr/local/bin/llama-server --port ${PORT}"

models:
  "default":
    name: "Default model (configure me)"
    description: "Set LLAMA_SKEIN_MODEL_URL or mount a GGUF at /models/default.gguf — see config.yaml comments"
    cmd: |
      ${llama-server}
      --model /models/default.gguf
      --ctx-size 8192
      -ngl 999
