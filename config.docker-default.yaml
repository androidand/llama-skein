# Minimal config for the Docker image. No model is bundled — mount a GGUF
# at /models/default.gguf, or set LLAMA_SKEIN_MODEL_URL (see
# docker-entrypoint.sh). --ctx-size is intentionally not set here: llama-server
# defaults to each model's own trained context length. To cap it lower (e.g.
# for a memory-constrained deployment), set LLAMA_ARG_CTX_SIZE — llama-server
# reads it natively, no llama-skein-specific plumbing needed. Adjust -ngl
# below directly for your hardware.

healthCheckTimeout: 120
logLevel: info

macros:
  "llama-server": "/usr/local/bin/llama-server --port ${PORT}"

models:
  "default":
    name: "Default model (configure me)"
    description: "Set LLAMA_SKEIN_MODEL_URL or mount a GGUF at /models/default.gguf — see config.yaml comments"
    cmd: |
      ${llama-server}
      --model /models/default.gguf
      -ngl 999
