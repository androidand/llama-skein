# Default runnable config for the bundled Docker image (see Dockerfile).
# Unlike config.example.yaml (a reference covering every option), this is
# meant to be a minimal, hardware-agnostic starting point: this image gets
# deployed on arbitrary hardware, so there is no bundled model and no
# assumption about available VRAM/RAM. The "default" model entry below
# will fail to start until you either:
#   - mount your own GGUF at /models/default.gguf, or
#   - set LLAMA_SKEIN_MODEL_URL (docker-entrypoint.sh fetches it on first
#     start) and adjust --ctx-size / -ngl for your hardware.
#
# --ctx-size 8192 below is a conservative default sized for small/mid
# models on modest hardware — raise it for larger-context use cases once
# you know your actual model and available memory.

healthCheckTimeout: 120
logLevel: info

macros:
  "llama-server": "/usr/local/bin/llama-server --port ${PORT}"

models:
  "default":
    name: "Default model (configure me)"
    description: "Set LLAMA_SKEIN_MODEL_URL or mount a GGUF at /models/default.gguf — see config.yaml comments"
    cmd: |
      ${llama-server}
      --model /models/default.gguf
      --ctx-size 8192
      -ngl 999
