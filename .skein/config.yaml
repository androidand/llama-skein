# behaviour: optional pipeline tuning
# behaviour:
#     auto_ideate_secs: 300       # idle seconds before auto-generating a new idea (0 = disabled)
#     graphify_auto_update: true  # rebuild knowledge graph after code changes
#     context_auto_tune: true     # auto-adjust per-provider context window sizes
#     coder_validate: true        # run build+test validation inside the coder step
#     use_native_agent: false     # use skein's native LLM runner instead of opencode

# timing: stage timeout overrides — all values in seconds; 0 = built-in default
# timing:
#     max_iters: 5                  # coder iterations per change (default 5)
#     heartbeat_secs: 60            # supervisor heartbeat interval
#     debugger_timeout: 600         # max time for debugger/verify stage
#     reviewer_timeout: 300         # max time for reviewer stage
#     plan_timeout: 300             # max time for plan stage
#     architect_timeout: 300        # max time for architect stage
#     conflict_max_iters: 3         # max iterations for resolving merge conflicts
#     agent_idle_timeout_secs: 120  # kill agent process after N seconds of silence

# stuck_recovery: watchdog auto-recovery for stale stuck changes
# stuck_recovery:
#     enabled: true
#     stale_age_secs: 3600  # age before a stuck change is considered stale (default 3600)
#     min_stuck: 1          # minimum stuck count to trigger recovery
#     min_heal_cycles: 2    # watchdog cycles to wait before attempting recovery
#     max_recoveries: 3     # max recovery attempts per change lifetime
#     max_per_cycle: 1      # max recoveries triggered per watchdog cycle

# log_cleanup: automatic log rotation
# log_cleanup:
#     enabled: true
#     retention_days: 2    # keep full logs for N days (default 2)
#     archive_days: 14     # keep archived logs for N days (default 14)
#     interval_secs: 3600  # cleanup check interval in seconds (default 3600)
#     size_threshold_mb: 500  # prune oldest logs when directory exceeds this size

# telegram: optional Telegram bot for push notifications and interactive commands
# telegram:
#     bot_token: ""              # or set SKEIN_TELEGRAM_TOKEN env var
#     allowed_user_ids: [12345]  # numeric Telegram user IDs (from @userinfobot)
#     allowed_usernames: [alice] # @usernames without the @
#     # enabled: false           # explicitly disable even when credentials are present

# api: REST API authentication
# api:
#     token: ""  # static bearer token; empty = unauthenticated (local-only is fine)

# openspec_dir: custom path to openspec directory (default: <repo>/openspec)
# openspec_dir: docs/openspec

# beads_dir: custom path to beads issue tracker (default: <repo>/.beads)
# beads_dir: .beads

# work_dir: override working directory for supervisor processes
# work_dir: /path/to/workdir

# providers inventory comes from opencode catalog; configure policy via:
#   - providers: allow/model pins
#   - chains: role routing order
#   - agents: explicit role→provider assignments

