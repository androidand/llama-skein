# .skein/config.yaml — Skein project configuration
# Run 'skein init' to configure providers and chains interactively.
#
work_dir: ""
providers:
    - proxmox
    - m3
    - m5
    - rocky
    - cerebras:llama-3.3-70b
    - groq:llama-3.3-70b-versatile
    - gemini:gemini-2.5-flash
    - huggingface:Qwen-Qwen2.5-72B-Instruct
    - zai:glm-4.7-flash
    - openrouter:poolside/laguna-m.1:free
    - opencode-go:deepseek-v4-flash-free
    - z4
tiers:
    cerebras: free-cloud
    gemini: free-cloud
    groq: free-cloud
    huggingface: free-cloud
    opencode-go: free-cloud
    openrouter: free-cloud
    zai: free-cloud
free_cloud_policy:
    max_calls_per_change: 20
    min_iter_gap: 1

# ─── REFERENCE ──────────────────────────────────────────────────────────────
# Every recognized .skein/config.yaml field, with defaults and valid values.
# Uncomment and adjust any section you want to override.
# ────────────────────────────────────────────────────────────────────────────

# merge_policy: what happens after a change passes VERIFY
#   auto   — supervisor merges the PR immediately (default)
#   review — a reviewer agent reviews the diff; supervisor merges if no REJECT token
#   notify — supervisor opens PR + sends Telegram notification; human merges
#   manual — supervisor opens PR only; human discovers and merges on own schedule
# merge_policy: auto

# chains: ordered fallback list of provider:agent entries per role.
# Format:  <system>/<provider>:<agent>            (local)
#          <system>/<provider>:<agent>:<system>/<model-id>  (model-pinned)
#          <cloud-provider>:<agent>               (cloud)
# Multiple entries = fallback order; first reachable provider wins.
#
# chains:
#     # ── Local providers (from providers inventory/opencode catalog) ─────
#     coder:
#         - proxmox/llama_swap:coder
#         - rocky/llama_swap:coder
#         - m3/llamaswap:coder
#     debugger:
#         - m5/llamaswap:debugger
#         - proxmox/llama_swap:debugger
#     analyst:
#         - m3/llamaswap:analyst
#     reviewer:
#         - m5/llamaswap:reviewer
#     planner:
#         - m3/llamaswap:architect
#     architect:
#         - m3/llamaswap:architect
#     researcher:
#         - proxmox/llama_swap:researcher
#     publisher:
#         - m5/llamaswap:publisher
#
#     # ── Model pinning (append :<system>/<model-id>) ──────────────────────
#     # coder:
#     #     - proxmox/llama_swap:coder:proxmox/qwen3-30b-a3b
#     #     - rocky/llama_swap:coder:rocky/qwen3-14b-distill
#
#     # ── Cloud providers (API keys in opencode.json or env) ───────────────
#     # coder:
#     #     - anthropic:coder
#     #     - openai:coder
#     # reviewer:
#     #     - anthropic:reviewer
#     #     - openai:reviewer
#     #     - google:reviewer
#
#     # ── Mixed: local first, cloud fallback ──────────────────────────────
#     # coder:
#     #     - proxmox/llama_swap:coder
#     #     - anthropic:coder

# providers: flat list restricting dispatch to selected providers.
#   An empty list permits every provider — not recommended when cloud providers
#   are configured, to avoid unexpected API spend.
#   Format: "provider" | "provider:model" | "provider:model:role"
# providers:
#     - proxmox/llama_swap
#     - rocky/llama_swap
#     - m3/llamaswap
#     - m5/llamaswap
#     # Cloud (requires credentials in opencode.json):
#     # - anthropic
#     # - openai
#     # - google
#     # - groq
#     # - openrouter
#     # - azure
#     # - vertex
#     # - bedrock
#     # - zenmux
#     # - copilot
#     # - gitlab

# behaviour: optional pipeline tuning
# behaviour:
#     auto_ideate_secs: 300       # idle seconds before auto-generating a new idea (0 = disabled)
#     graphify_auto_update: true  # rebuild knowledge graph after code changes
#     coder_validate: true        # run build+test validation inside the coder step
#     auto_heal_models: false     # auto-replace stale cloud model IDs at startup using live catalog suggestions
#     max_concurrent_changes: 6        # cap simultaneously active changes (default 6)
#     max_open_tasks_per_assignment: 12 # block changes with more unchecked tasks than this until split (default 12)
#     max_no_progress_cycles: 2        # demote a change to blocked after this many 0-task dispatch cycles (default 2)
#     digest_hour: 8                   # local hour (0-23) the daily Telegram digest sends at (default 8 = 08:00)

# antiloop: NO_PROGRESS streak tracking, forced chain advance, and auto-block
# on chain exhaustion for funnel stages (supervisor-outcome-robustness-antiloop)
# antiloop:
#     enabled: true  # default true; set false to restore pre-antiloop dispatch behaviour exactly

# timing: stage timeout overrides — all values in seconds; 0 = built-in default
# timing:
#     max_iters: 5                  # coder iterations per change (default 5)
#     heartbeat_secs: 60            # supervisor heartbeat interval
#     debugger_timeout: 600         # max time for debugger/verify stage
#     reviewer_timeout: 300         # max time for reviewer stage
#     plan_timeout: 300             # max time for plan stage
#     architect_timeout: 300        # max time for architect stage
#     conflict_max_iters: 3         # max iterations for resolving merge conflicts
#     agent_idle_timeout_secs: 120  # kill agent process after N seconds of silence

# stuck_recovery: watchdog auto-recovery for stale stuck changes
# stuck_recovery:
#     enabled: true
#     stale_age_secs: 3600  # age before a stuck change is considered stale (default 3600)
#     min_stuck: 1          # minimum stuck count to trigger recovery
#     min_heal_cycles: 2    # watchdog cycles to wait before attempting recovery
#     max_recoveries: 5     # max recovery attempts per change lifetime
#     max_per_cycle: 1      # max recoveries triggered per watchdog cycle

# log_cleanup: automatic log rotation
# log_cleanup:
#     enabled: true
#     retention_days: 2    # keep full logs for N days (default 2)
#     archive_days: 14     # keep archived logs for N days (default 14)
#     interval_secs: 3600  # cleanup check interval in seconds (default 3600)
#     size_threshold_mb: 500  # prune oldest logs when directory exceeds this size

# telegram: optional Telegram bot for push notifications and interactive commands
# telegram:
#     bot_token: ""              # or set SKEIN_TELEGRAM_TOKEN env var
#     allowed_user_ids: [12345]  # numeric Telegram user IDs (from @userinfobot)
#     allowed_usernames: [alice] # @usernames without the @
#     # enabled: false           # explicitly disable even when credentials are present

# api: REST API authentication
# api:
#     token: ""  # static bearer token; empty = unauthenticated (local-only is fine)

# protected_paths: repo-relative glob patterns agents must never write to or
# edit (read-only reference repos, vendored sources). Enforced at the native
# runner's tool-dispatch layer; a pattern protects its whole subtree.
# protected_paths:
#     - ai_agent_ha/**
#     - vendor

# openspec_dir: custom path to openspec directory (default: <repo>/openspec)
# openspec_dir: docs/openspec

# beads_dir: custom path to beads issue tracker (default: <repo>/.beads)
# beads_dir: .beads

# work_dir: override working directory for supervisor processes
# work_dir: /path/to/workdir

# providers inventory comes from opencode catalog; configure policy via:
#   - providers: flat list / model pins
#   - chains: role routing order
#   - agents: explicit role→provider assignments

# legacy compatibility schema (not primary operator model):
# systems:
#     <provider_group>:
#         label: <string>
#         display_name: <string>
#         local: true|false
#         vram_gb: <int>
#         memory_type: dedicated|unified
#         model_formats: [gguf, mlx]
#         providers:
#             <provider>:
#                 type: llama_swap|lmstudio|ollama
#                 api_url: <url>
#                 opencode_provider: <slug>
#                 opencode_name: <name>

# agents: explicit agent-to-provider assignments (usually written by skein init)
# agents:
#     coder:     [proxmox/llama_swap, rocky/llama_swap]
#     debugger:  [m5/llamaswap]
#     analyst:   [m3/llamaswap]
#     reviewer:  [proxmox/llama_swap, rocky/llama_swap]

# tiers: provider cost class (local|free-cloud|paid)
# free_cloud_policy: max_calls_per_change + min_iter_gap for conservative free-cloud routing

# roles: per-role slash command overrides (rarely needed)
# roles:
#     my_custom_role:
#         command: /skein-my-custom-command
