#
# Project policy only: provider inventory lives in ~/.config/opencode/opencode.json.
# chains: maps each role to an ordered list of provider/provider:agent entries.
# providers: list entries are "provider[:model[:role]]".
#   - provider only (recommended default): use currently loaded/best available model
#   - provider:model: optional model pin (all roles unless role-specific entry exists)
#   - provider:model:role: role-specific pin
#
# Cloud providers can exist in opencode catalog without participating in work.
# To keep a provider listable but unscheduled: do not include it in chains.
# (Auto-generated fallback chains include only local providers.)
#
# Find provider/model inventory:
#   skein catalog list
#   skein providers probe


