# merge_policy: what happens after a change passes VERIFY
#   auto   — supervisor merges the PR immediately (default)
#   review — a reviewer agent reviews the diff; supervisor merges if no REJECT token
#   notify — supervisor opens PR + sends Telegram notification; human merges
#   manual — supervisor opens PR only; human discovers and merges on own schedule
# merge_policy: auto

# chains: ordered fallback list of provider:agent entries per role.
# Format:  <system>/<provider>:<agent>            (local)
#          <system>/<provider>:<agent>:<system>/<model-id>  (model-pinned)
#          <cloud-provider>:<agent>               (cloud)
# Multiple entries = fallback order; first reachable provider wins.
#
# chains:
#     # ── Local providers (from providers inventory/opencode catalog) ─────
#     coder:
#         - proxmox/llama_swap:coder
#         - rocky/llama_swap:coder
#         - mac/lmstudio:coder
#     debugger:
#         - mac/lmstudio:debugger
#         - proxmox/llama_swap:debugger
#     analyst:
#         - mac/lmstudio:analyst
#     reviewer:
#         - mac/lmstudio:reviewer
#     planner:
#         - mac/lmstudio:architect
#     architect:
#         - mac/lmstudio:architect
#     researcher:
#         - proxmox/llama_swap:researcher
#     publisher:
#         - mac/lmstudio:publisher
#
#     # ── Model pinning (append :<system>/<model-id>) ──────────────────────
#     # coder:
#     #     - proxmox/llama_swap:coder:proxmox/qwen3-30b-a3b
#     #     - rocky/llama_swap:coder:rocky/qwen3-14b-distill
#
#     # ── Cloud providers (API keys in opencode.json or env) ───────────────
#     # coder:
#     #     - anthropic:coder
#     #     - openai:coder
#     # reviewer:
#     #     - anthropic:reviewer
#     #     - openai:reviewer
#     #     - google:reviewer
#
#     # ── Mixed: local first, cloud fallback ──────────────────────────────
#     # coder:
#     #     - proxmox/llama_swap:coder
#     #     - anthropic:coder

